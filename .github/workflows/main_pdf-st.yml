name: Build and deploy Node.js app to Azure Web App - pdf-st

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: pdf-st
  AZURE_AGENT_WEBAPP_NAME: pdf-st-agent

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install dependencies
        run: npm ci

      - name: Install veraPDF
        run: npm run install:verapdf

      - name: Bundle Java runtime for App Service
        run: |
          rm -rf modules/validator/vendor/java
          cp -aL "$JAVA_HOME" modules/validator/vendor/java

      - name: Precompile validator metadata probe
        run: |
          mkdir -p modules/validator/.build
          javac -encoding UTF-8 \
            -cp modules/validator/vendor/verapdf/app/bin/pdfbox-apps-1.28.2.jar \
            -d modules/validator/.build \
            modules/validator/java/MetadataProbeCli.java

      - name: Run CI tests
        run: npm run test:ci

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          include-hidden-files: true
          path: |
            package.json
            package-lock.json
            contracts
            modules
            orchestrator
            scripts
            node_modules

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: .

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: Production
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_ACD740455A5349C39402201CFF9EB214 }}

  deploy-agent:
    if: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_AGENT != '' && secrets.AGENT_MASTER_ENDPOINT != '' }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: .

      - name: Write agent runtime bootstrap config
        shell: bash
        run: |
          cat > orchestrator/agent-runtime.config.json <<EOF
          {
            "masterEndpoint": "${{ secrets.AGENT_MASTER_ENDPOINT }}",
            "apiKey": "${{ secrets.AGENT_API_KEY }}",
            "adminKey": "${{ secrets.AGENT_ADMIN_KEY }}",
            "pollIntervalMs": 5000,
            "heartbeatIntervalMs": 5000,
            "checkInIntervalMs": 5000
          }
          EOF

      - name: Deploy Azure App Service worker agent
        id: deploy-agent-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_AGENT_WEBAPP_NAME }}
          slot-name: Production
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_AGENT }}
