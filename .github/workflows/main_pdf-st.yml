name: Build and deploy Node.js app to Azure Web App - pdf-st

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: pdf-st

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install dependencies
        run: npm ci

      - name: Install veraPDF
        run: npm run install:verapdf

      - name: Bundle Java runtime for App Service
        run: |
          rm -rf modules/validator/vendor/java
          cp -aL "$JAVA_HOME" modules/validator/vendor/java

      - name: Precompile validator metadata probe
        run: |
          mkdir -p modules/validator/.build
          javac -encoding UTF-8 \
            -cp modules/validator/vendor/verapdf/app/bin/pdfbox-apps-1.28.2.jar \
            -d modules/validator/.build \
            modules/validator/java/MetadataProbeCli.java

      - name: Run CI tests
        run: npm run test:ci

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          include-hidden-files: true
          path: |
            package.json
            package-lock.json
            contracts
            modules
            orchestrator
            scripts
            node_modules

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: .

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: Production
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_ACD740455A5349C39402201CFF9EB214 }}

  deploy-agents:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        agent:
          - name: pdf-st-agent1
            publish_profile_secret: AZUREAPPSERVICE_PUBLISHPROFILE_AGENT1
          - name: pdf-st-agent2
            publish_profile_secret: AZUREAPPSERVICE_PUBLISHPROFILE_AGENT2
          - name: pdf-st-agent3
            publish_profile_secret: AZUREAPPSERVICE_PUBLISHPROFILE_AGENT3
    env:
      AGENT_MASTER_ENDPOINT: ${{ secrets.AGENT_MASTER_ENDPOINT }}
      AGENT_API_KEY: ${{ secrets.AGENT_API_KEY }}
      AGENT_ADMIN_KEY: ${{ secrets.AGENT_ADMIN_KEY }}
      PUBLISH_PROFILE: ${{ secrets[matrix.agent.publish_profile_secret] }}

    steps:
      - name: Skip when secrets are missing
        if: ${{ env.PUBLISH_PROFILE == '' || env.AGENT_MASTER_ENDPOINT == '' }}
        run: echo "Skipping ${{ matrix.agent.name }} — publish profile or master endpoint not configured."

      - name: Download artifact from build job
        if: ${{ env.PUBLISH_PROFILE != '' && env.AGENT_MASTER_ENDPOINT != '' }}
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: .

      - name: Write agent runtime bootstrap config
        if: ${{ env.PUBLISH_PROFILE != '' && env.AGENT_MASTER_ENDPOINT != '' }}
        shell: bash
        run: |
          cat > orchestrator/agent-runtime.config.json <<EOF
          {
            "masterEndpoint": "${{ env.AGENT_MASTER_ENDPOINT }}",
            "apiKey": "${{ env.AGENT_API_KEY }}",
            "adminKey": "${{ env.AGENT_ADMIN_KEY }}",
            "agentName": "${{ matrix.agent.name }}",
            "pollIntervalMs": 5000,
            "heartbeatIntervalMs": 5000,
            "checkInIntervalMs": 5000
          }
          EOF

      - name: Deploy ${{ matrix.agent.name }}
        if: ${{ env.PUBLISH_PROFILE != '' && env.AGENT_MASTER_ENDPOINT != '' }}
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ matrix.agent.name }}
          slot-name: Production
          package: .
          publish-profile: ${{ env.PUBLISH_PROFILE }}
