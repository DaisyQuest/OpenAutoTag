# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - pdf-st-agent1

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install dependencies
        run: npm ci

      - name: Cache veraPDF installation
        id: cache-verapdf
        uses: actions/cache@v4
        with:
          path: modules/validator/vendor/verapdf
          key: verapdf-pdfbox-1.28.2-${{ runner.os }}

      - name: Install veraPDF
        if: steps.cache-verapdf.outputs.cache-hit != 'true'
        run: npm run install:verapdf

      - name: Bundle Java runtime for App Service
        run: |
          rm -rf modules/validator/vendor/java
          cp -aL "$JAVA_HOME" modules/validator/vendor/java

      - name: Precompile validator metadata probe
        run: |
          mkdir -p modules/validator/.build
          javac -encoding UTF-8 \
            -cp modules/validator/vendor/verapdf/app/bin/pdfbox-apps-1.28.2.jar \
            -d modules/validator/.build \
            modules/validator/java/MetadataProbeCli.java

      - name: Run CI tests
        run: npm run test:ci

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app-agent1
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app-agent1

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'pdf-st-agent1'
          slot-name: 'Production'
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_E59120C424904721AB7BDC3F7519957E }}
