# OpenAutoTag servlet bootstrap dependency locations.
#
# The bootstrap script reads this file to decide where each servlet runtime
# dependency should be retrieved from. Point these values at internal mirrors for
# offline or controlled deployments. Defaults use the public sources already used
# by this project.

[bootstrap]
install_root=.servlet-bootstrap
runtime_root=.servlet-runtime
build_war=false
install_verapdf=true
install_fonts=true

[portable]
bootstrap_root=.portable-bootstrap
staging_root=dist/portable
package_name=OpenAutoTag-portable
zip=true
port=3001

[node_engine]
required_major=22
prefer_system=true
base_url=https://nodejs.org/dist/latest-v22.x
# Optional per-platform archive overrides. Leave blank to resolve from
# base_url/SHASUMS256.txt.
windows_x64_archive=
windows_arm64_archive=
linux_x64_archive=
linux_arm64_archive=
macos_x64_archive=
macos_arm64_archive=
# Optional absolute path to a preinstalled node executable.
executable=

[node_modules]
# Treat the entire node_modules tree as one dependency for the Node engine.
registry=https://registry.npmjs.org/
npm_command=ci

[verapdf]
installer_url=https://software.verapdf.org/releases/1.28/verapdf-pdfbox-1.28.2-installer.zip
fallback_url=https://software.verapdf.org/releases/verapdf-pdfbox-installer.zip

[fonts]
noto_cjk_base_url=https://github.com/notofonts/noto-cjk/raw/main/Sans/OTF
noto_cjk_license_url=https://raw.githubusercontent.com/notofonts/noto-cjk/main/Sans/LICENSE

[java_dependencies]
build_tool=gradle
maven_repository=https://repo.maven.apache.org/maven2
gradle_user_home=.servlet-bootstrap/gradle
# Optional absolute JDK 21 path. Leave blank to use JAVA_HOME from the shell.
java_home=

[java_runtime]
# Portable packages bundle a JDK so extracted copies can compile and run the
# Java helper CLIs without system Java.
bundle=true
# Optional absolute JDK 21 path to copy instead of downloading one.
home=
windows_x64_url=https://api.adoptium.net/v3/binary/latest/21/ga/windows/x64/jdk/hotspot/normal/eclipse
windows_arm64_url=https://api.adoptium.net/v3/binary/latest/21/ga/windows/aarch64/jdk/hotspot/normal/eclipse
linux_x64_url=https://api.adoptium.net/v3/binary/latest/21/ga/linux/x64/jdk/hotspot/normal/eclipse
linux_arm64_url=https://api.adoptium.net/v3/binary/latest/21/ga/linux/aarch64/jdk/hotspot/normal/eclipse
macos_x64_url=https://api.adoptium.net/v3/binary/latest/21/ga/mac/x64/jdk/hotspot/normal/eclipse
macos_arm64_url=https://api.adoptium.net/v3/binary/latest/21/ga/mac/aarch64/jdk/hotspot/normal/eclipse

[tomee]
# Optional. The script always writes setenv templates under install_root. It does
# not overwrite TomEE's live bin/setenv files.
home=
