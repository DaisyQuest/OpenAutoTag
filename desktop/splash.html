<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF Accessibility Engine</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(145deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      color: #f1f5f9;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden;
      -webkit-app-region: drag;
      user-select: none;
    }

    .logo {
      font-size: 48px;
      font-weight: 300;
      letter-spacing: -1px;
      margin-bottom: 4px;
      background: linear-gradient(135deg, #60a5fa, #a78bfa, #60a5fa);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: gradientShift 4s ease-in-out infinite;
    }

    .subtitle {
      font-size: 13px;
      font-weight: 400;
      color: #94a3b8;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 40px;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(148, 163, 184, 0.15);
      border-top-color: #60a5fa;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 20px;
    }

    .status {
      font-size: 13px;
      color: #64748b;
      transition: opacity 0.3s ease;
    }

    .version {
      position: absolute;
      bottom: 16px;
      right: 20px;
      font-size: 11px;
      color: #334155;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }
  </style>
</head>
<body>
  <div class="logo">PDF Accessibility Engine</div>
  <div class="subtitle">Open Auto Tag</div>
  <div class="spinner"></div>
  <div class="status" id="status">Initializing...</div>
  <div class="version" id="version">v1.0.0</div>

  <script>
    // Listen for status updates from the main process
    if (window.electronAPI) {
      window.electronAPI.onSplashStatus((message) => {
        const el = document.getElementById("status");
        if (el) {
          el.style.opacity = "0";
          setTimeout(() => {
            el.textContent = message;
            el.style.opacity = "1";
          }, 150);
        }
      });

      window.electronAPI.getAppVersion().then((v) => {
        const el = document.getElementById("version");
        if (el && v) el.textContent = "v" + v;
      });
    }
  </script>
</body>
</html>
