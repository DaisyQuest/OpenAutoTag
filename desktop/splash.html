<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF Accessibility Engine</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(145deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      color: #f1f5f9;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden;
      -webkit-app-region: drag;
      user-select: none;
      transition: opacity .5s ease;
    }

    body.fade-out {
      opacity: 0;
    }

    .logo {
      font-size: 48px;
      font-weight: 300;
      letter-spacing: -1px;
      margin-bottom: 4px;
      background: linear-gradient(135deg, #60a5fa, #a78bfa, #60a5fa);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: gradientShift 4s ease-in-out infinite;
    }

    .subtitle {
      font-size: 13px;
      font-weight: 400;
      color: #94a3b8;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 40px;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(148, 163, 184, 0.15);
      border-top-color: #60a5fa;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }

    /* Subtle progress bar below spinner */
    .splash-progress {
      width: 180px;
      height: 3px;
      background: rgba(148, 163, 184, 0.1);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 20px;
    }

    .splash-progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #60a5fa, #a78bfa);
      border-radius: 2px;
      transition: width .6s ease;
    }

    .status {
      font-size: 13px;
      color: #64748b;
      transition: opacity 0.3s ease;
      min-height: 1.2em;
    }

    .version {
      position: absolute;
      bottom: 16px;
      right: 20px;
      font-size: 11px;
      color: #334155;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }
  </style>
</head>
<body>
  <div class="logo">PDF Accessibility Engine</div>
  <div class="subtitle">Open Auto Tag</div>
  <div class="spinner"></div>
  <div class="splash-progress">
    <div class="splash-progress-fill" id="progressFill"></div>
  </div>
  <div class="status" id="status">Starting server...</div>
  <div class="version" id="version">v0.1.0</div>

  <script>
    // Animated dots for the status text
    (function () {
      var statusEl = document.getElementById("status");
      var baseText = "Starting server";
      var dotCount = 0;
      var dotInterval = null;
      var currentBase = baseText;

      function startDotAnimation(text) {
        currentBase = text || baseText;
        dotCount = 0;
        if (dotInterval) clearInterval(dotInterval);
        dotInterval = setInterval(function () {
          dotCount = (dotCount % 3) + 1;
          var dots = "";
          for (var i = 0; i < dotCount; i++) dots += ".";
          // Pad to 3 to prevent text reflow
          for (var j = dotCount; j < 3; j++) dots += "\u00A0";
          if (statusEl) statusEl.textContent = currentBase + dots;
        }, 500);
      }

      // Start the default animation
      startDotAnimation(baseText);

      // Simulated progress bar advancement
      var progressEl = document.getElementById("progressFill");
      var progress = 0;
      var progressInterval = setInterval(function () {
        // Advance slowly, never reaching 100% until ready
        if (progress < 85) {
          progress += Math.random() * 8 + 2;
          if (progress > 85) progress = 85;
          if (progressEl) progressEl.style.width = progress + "%";
        }
      }, 800);

      // Fade-out function for when main window is ready
      function fadeOutSplash() {
        // Complete the progress bar
        if (progressEl) progressEl.style.width = "100%";
        if (dotInterval) clearInterval(dotInterval);
        if (progressInterval) clearInterval(progressInterval);
        if (statusEl) statusEl.textContent = "Ready!";
        setTimeout(function () {
          document.body.classList.add("fade-out");
        }, 300);
      }

      // Listen for status updates from the main process
      if (window.electronAPI) {
        window.electronAPI.onSplashStatus(function (message) {
          if (message === "__FADE_OUT__") {
            fadeOutSplash();
            return;
          }
          // Update status with animated dots
          if (statusEl) {
            statusEl.style.opacity = "0";
            setTimeout(function () {
              startDotAnimation(message);
              statusEl.style.opacity = "1";
            }, 150);
          }
        });

        window.electronAPI.getAppVersion().then(function (v) {
          var el = document.getElementById("version");
          if (el && v) el.textContent = "v" + v;
        });
      }

      // Expose fadeOut for programmatic use
      window.splashFadeOut = fadeOutSplash;
    })();
  </script>
</body>
</html>
